name: portable-version-release

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      desktop_tag:
        description: 'Optional Desktop version selector override (accepts refs/tags/vX, vX, or X).'
        required: false
        type: string
      service_tag:
        description: 'Optional service version selector override (accepts refs/tags/vX, vX, or X).'
        required: false
        type: string
      platforms:
        description: 'Comma-separated platforms (linux-x64, win-x64, osx-universal, osx-x64, osx-arm64, or all).'
        required: false
        default: 'linux-x64'
        type: string
      force_rebuild:
        description: 'Continue even when the derived Portable Version release already exists.'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Resolve and delegate packaging without publishing to the Azure Steam container.'
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types:
      - portable-version-build
      - portable-version-upstream-release

permissions:
  contents: write
  actions: read

concurrency:
  group: portable-version-release-${{ github.event_name }}-${{ github.ref || github.run_id }}
  cancel-in-progress: false

env:
  DEFAULT_PLATFORMS: linux-x64,win-x64,osx-universal
  DESKTOP_AZURE_SAS_URL: ${{ secrets.STEAM_PACKER_DESKTOP_AZURE_SAS_URL || secrets.DESKTOP_AZURE_SAS_URL || secrets.PORTABLE_VERSION_DESKTOP_AZURE_SAS_URL }}
  SERVICE_AZURE_SAS_URL: ${{ secrets.STEAM_PACKER_SERVICE_AZURE_SAS_URL || secrets.SERVICE_AZURE_SAS_URL || secrets.PORTABLE_VERSION_SERVICE_AZURE_SAS_URL }}
  STEAM_AZURE_SAS_URL: ${{ secrets.STEAM_PACKER_STEAM_AZURE_SAS_URL || secrets.STEAM_AZURE_SAS_URL || secrets.PORTABLE_VERSION_STEAM_AZURE_SAS_URL }}

jobs:
  resolve:
    name: Resolve build plan
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.resolve.outputs.should_build }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      platform_matrix: ${{ steps.resolve.outputs.platform_matrix }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
      handoff_schema: ${{ steps.resolve.outputs.handoff_schema }}
    steps:
      - name: Checkout portable-version
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Resolve normalized build plan
        id: resolve
        working-directory: .
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          STEAM_PACKER_DESKTOP_AZURE_SAS_URL: ${{ env.DESKTOP_AZURE_SAS_URL }}
          STEAM_PACKER_SERVICE_AZURE_SAS_URL: ${{ env.SERVICE_AZURE_SAS_URL }}
          STEAM_PACKER_STEAM_AZURE_SAS_URL: ${{ env.STEAM_AZURE_SAS_URL }}
        run: |
          cp "$GITHUB_EVENT_PATH" "$RUNNER_TEMP/portable-version-event.json"
          node scripts/resolve-build-plan.mjs \
            --event-name "$GITHUB_EVENT_NAME" \
            --event-path "$RUNNER_TEMP/portable-version-event.json" \
            --output "$RUNNER_TEMP/build-plan.json" \
            --default-platforms "$DEFAULT_PLATFORMS"

      - name: Upload Portable Version release plan artifact
        uses: actions/upload-artifact@v6
        with:
          name: steam-packer-build-plan
          path: ${{ runner.temp }}/build-plan.json
          if-no-files-found: error

  package_and_publish:
    name: Delegate packaging and Azure publication
    needs: resolve
    if: needs.resolve.outputs.should_build == 'true'
    uses: HagiCode-org/steam_packer/.github/workflows/portable-version-package.yml@main
    with:
      build_plan_artifact_name: steam-packer-build-plan
    secrets:
      desktop_azure_sas_url: ${{ secrets.STEAM_PACKER_DESKTOP_AZURE_SAS_URL || secrets.DESKTOP_AZURE_SAS_URL || secrets.PORTABLE_VERSION_DESKTOP_AZURE_SAS_URL }}
      service_azure_sas_url: ${{ secrets.STEAM_PACKER_SERVICE_AZURE_SAS_URL || secrets.SERVICE_AZURE_SAS_URL || secrets.PORTABLE_VERSION_SERVICE_AZURE_SAS_URL }}
      steam_azure_sas_url: ${{ secrets.STEAM_PACKER_STEAM_AZURE_SAS_URL || secrets.STEAM_AZURE_SAS_URL || secrets.PORTABLE_VERSION_STEAM_AZURE_SAS_URL }}
      steam_depot_id_linux: ${{ secrets.STEAM_DEPOT_ID_LINUX }}
      steam_depot_id_windows: ${{ secrets.STEAM_DEPOT_ID_WINDOWS }}
      steam_depot_id_macos: ${{ secrets.STEAM_DEPOT_ID_MACOS }}

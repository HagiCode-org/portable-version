name: portable-version-steam-release

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Optional Portable Version release tag to publish to Steam. Leave blank to use the latest Azure-published release.'
        required: false
        type: string
      steam_preview:
        description: 'Generate a Steam preview build instead of publishing and setting the beta branch live.'
        required: false
        default: false
        type: boolean
      steam_branch:
        description: 'Steam branch to set live for non-preview uploads.'
        required: false
        default: 'beta'
        type: string
      steam_description:
        description: 'Optional Steam build description override.'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: portable-version-steam-${{ github.event.inputs.release || github.run_id }}
  cancel-in-progress: false

jobs:
  publish_steam:
    name: Publish Steam build
    runs-on:
      - self-hosted
      - Linux
      - X64
      - steam
    env:
      STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
      STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
      STEAM_SHARED_SECRET: ${{ secrets.STEAM_SHARED_SECRET }}
      STEAM_GUARD_CODE: ${{ secrets.STEAM_GUARD_CODE }}
    steps:
      - name: Checkout portable-version
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Prepare Steam release hydration input
        working-directory: .
        shell: bash
        env:
          PORTABLE_VERSION_STEAM_AZURE_SAS_URL: ${{ secrets.PORTABLE_VERSION_STEAM_AZURE_SAS_URL }}
        run: |
          cmd=(
            node scripts/prepare-steam-release-input.mjs
            --output-dir "$RUNNER_TEMP/portable-steam-release"
          )
          if [ -n "${{ github.event.inputs.release }}" ]; then
            cmd+=(--release "${{ github.event.inputs.release }}")
          fi

          "${cmd[@]}"

      - name: Resolve effective Steam release metadata
        id: resolved_release
        shell: bash
        run: |
          metadata_path="$RUNNER_TEMP/portable-steam-release/metadata/steam-release-input.json"
          node --input-type=module - "$metadata_path" <<'EOF' >> "$GITHUB_OUTPUT"
          import { readFileSync } from 'node:fs';

          const metadataPath = process.argv[2];
          const metadata = JSON.parse(readFileSync(metadataPath, 'utf8'));
          const requested = typeof metadata.requestedReleaseTag === 'string'
            ? metadata.requestedReleaseTag.trim()
            : '';
          const resolved = typeof metadata.resolvedReleaseTag === 'string' && metadata.resolvedReleaseTag.trim()
            ? metadata.resolvedReleaseTag.trim()
            : typeof metadata.releaseTag === 'string' && metadata.releaseTag.trim()
              ? metadata.releaseTag.trim()
              : '';

          if (!resolved) {
            throw new Error(`Resolved release tag missing from ${metadataPath}.`);
          }

          console.log(`requested_release_tag=${requested}`);
          console.log(`resolved_release_tag=${resolved}`);
          EOF

      - name: Summarize effective Steam release
        shell: bash
        env:
          REQUESTED_RELEASE_TAG: ${{ steps.resolved_release.outputs.requested_release_tag }}
          RESOLVED_RELEASE_TAG: ${{ steps.resolved_release.outputs.resolved_release_tag }}
        run: |
          {
            echo "## Portable Version Steam workflow context"
            if [ -n "$REQUESTED_RELEASE_TAG" ]; then
              echo "- Requested release tag: $REQUESTED_RELEASE_TAG"
            else
              echo "- Requested release tag: [latest]"
            fi
            echo "- Resolved release tag: $RESOLVED_RELEASE_TAG"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Steam release preparation metadata
        uses: actions/upload-artifact@v6
        with:
          name: portable-steam-release-preparation-${{ steps.resolved_release.outputs.resolved_release_tag }}
          path: ${{ runner.temp }}/portable-steam-release/metadata
          if-no-files-found: error

      - name: Install SteamCMD
        shell: bash
        env:
          STEAMCMD_ROOT_INPUT: ${{ vars.PORTABLE_VERSION_STEAMCMD_ROOT }}
        run: |
          steamcmd_root="${STEAMCMD_ROOT_INPUT:-$HOME/.local/share/portable-version/steamcmd}"
          mkdir -p "$steamcmd_root"
          if [ ! -x "$steamcmd_root/steamcmd.sh" ]; then
            curl -fsSL https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz | tar -xz -C "$steamcmd_root"
          fi
          mkdir -p "$steamcmd_root/config"
          echo "STEAMCMD_ROOT=$steamcmd_root" >> "$GITHUB_ENV"

      - name: Publish Steam build
        working-directory: .
        shell: bash
        env:
          STEAM_APP_ID: ${{ secrets.STEAM_APP_ID }}
          STEAMCMD_PATH: ${{ env.STEAMCMD_ROOT }}/steamcmd.sh
          STEAM_BRANCH_INPUT: ${{ github.event.inputs.steam_branch }}
          STEAM_DESCRIPTION_INPUT: ${{ github.event.inputs.steam_description }}
          STEAM_PREVIEW_INPUT: ${{ github.event.inputs.steam_preview }}
        run: |
          cmd=(
            node scripts/publish-steam.mjs
            --release-input "$RUNNER_TEMP/portable-steam-release/metadata/steam-release-input.json"
            --output-dir "$RUNNER_TEMP/portable-steam-build"
            --app-id "$STEAM_APP_ID"
          )
          if [ "$STEAM_PREVIEW_INPUT" != 'true' ] && [ -n "$STEAM_BRANCH_INPUT" ]; then
            cmd+=(--branch "$STEAM_BRANCH_INPUT")
          fi
          if [ -n "$STEAM_DESCRIPTION_INPUT" ]; then
            cmd+=(--description "$STEAM_DESCRIPTION_INPUT")
          fi
          if [ "$STEAM_PREVIEW_INPUT" = 'true' ]; then
            cmd+=(--preview)
          fi

          "${cmd[@]}"

      - name: Summarize SteamCMD persistence
        if: always()
        shell: bash
        run: |
          {
            echo "## SteamCMD persistence"
            echo "- Root: ${STEAMCMD_ROOT}"
            echo "- Config: ${STEAMCMD_ROOT}/config/config.vdf"
            if [ -f "${STEAMCMD_ROOT}/config/config.vdf" ]; then
              echo "- Saved login token: present"
            else
              echo "- Saved login token: missing"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Steam build metadata
        uses: actions/upload-artifact@v6
        with:
          name: portable-steam-build-metadata-${{ steps.resolved_release.outputs.resolved_release_tag }}
          path: ${{ runner.temp }}/portable-steam-build
          if-no-files-found: error
